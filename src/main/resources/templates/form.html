<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${accion == 'nueva'} ? 'Nueva Película' : 'Editar Película'">Formulario</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
</head>
<body class="bg-light">

    <!-- Navbar (fragmento reutilizable) -->
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="container mt-4" style="max-width: 600px;">

        <h2 class="mb-4"
            th:text="${accion == 'nueva'} ? 'Nueva Película' : 'Editar Película'">
        </h2>

        <!--
            Un solo formulario para crear Y editar:
            - Si accion == 'nueva'  → POST /nueva
            - Si accion == 'editar' → POST /editar/{id}
        -->
        <form th:action="${accion == 'nueva'} ? @{/nueva} : @{/editar/{id}(id=${pelicula.id})}"
              th:object="${pelicula}"
              method="post"
              class="card p-4 shadow-sm bg-white">

            <!-- Título -->
            <div class="mb-3">
                <label for="titulo" class="form-label fw-semibold">Título</label>
                <input type="text"
                       id="titulo"
                       th:field="*{titulo}"
                       th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid'"
                       class="form-control"
                       placeholder="Ej: El Padrino"/>
                <div th:if="${#fields.hasErrors('titulo')}"
                     class="invalid-feedback"
                     th:errors="*{titulo}">
                </div>
            </div>

            <!-- Director -->
            <div class="mb-3">
                <label for="director" class="form-label fw-semibold">Director</label>
                <input type="text"
                       id="director"
                       th:field="*{director}"
                       th:classappend="${#fields.hasErrors('director')} ? 'is-invalid'"
                       class="form-control"
                       placeholder="Ej: Francis Ford Coppola"/>
                <div th:if="${#fields.hasErrors('director')}"
                     class="invalid-feedback"
                     th:errors="*{director}">
                </div>
            </div>

            <!-- Género -->
            <div class="mb-3">
                <label for="genero" class="form-label fw-semibold">Género</label>
                <select id="genero"
                        th:field="*{genero}"
                        th:classappend="${#fields.hasErrors('genero')} ? 'is-invalid'"
                        class="form-select">
                    <option value="">-- Seleccione --</option>
                    <option value="Acción">Acción</option>
                    <option value="Comedia">Comedia</option>
                    <option value="Drama">Drama</option>
                    <option value="Terror">Terror</option>
                    <option value="Ciencia Ficción">Ciencia Ficción</option>
                    <option value="Animación">Animación</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Romance">Romance</option>
                    <option value="Documental">Documental</option>
                </select>
                <div th:if="${#fields.hasErrors('genero')}"
                     class="invalid-feedback"
                     th:errors="*{genero}">
                </div>
            </div>

            <!-- Año -->
            <div class="mb-3">
                <label for="anio" class="form-label fw-semibold">Año de estreno</label>
                <input type="number"
                       id="anio"
                       th:field="*{anio}"
                       th:classappend="${#fields.hasErrors('anio')} ? 'is-invalid'"
                       class="form-control"
                       placeholder="Ej: 1972"/>
                <div th:if="${#fields.hasErrors('anio')}"
                     class="invalid-feedback"
                     th:errors="*{anio}">
                </div>
            </div>

            <!-- Duración -->
            <div class="mb-4">
                <label for="duracion" class="form-label fw-semibold">Duración (minutos)</label>
                <input type="number"
                       id="duracion"
                       th:field="*{duracion}"
                       th:classappend="${#fields.hasErrors('duracion')} ? 'is-invalid'"
                       class="form-control"
                       placeholder="Ej: 175"/>
                <div th:if="${#fields.hasErrors('duracion')}"
                     class="invalid-feedback"
                     th:errors="*{duracion}">
                </div>
            </div>

            <!-- Botones -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${accion == 'nueva'} ? 'Guardar' : 'Actualizar'"></span>
                </button>
                <a th:href="@{/}" class="btn btn-outline-secondary">Cancelar</a>
            </div>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
