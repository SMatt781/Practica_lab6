<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CineGTICS - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
</head>
<body class="bg-dark d-flex align-items-center" style="min-height: 100vh;">

    <div class="container" style="max-width: 420px;">
        <div class="card shadow">
            <div class="card-body p-4">

                <h3 class="card-title text-center mb-4">🎬 CineGTICS</h3>

                <!-- Mensaje de error (Spring Security lo envía con ?error) -->
                <div th:if="${param.error}" class="alert alert-danger">
                    Correo o contraseña incorrectos. Intente de nuevo.
                </div>

                <!-- Mensaje de logout (Spring Security lo envía con ?logout) -->
                <div th:if="${param.logout}" class="alert alert-info">
                    Sesión cerrada correctamente.
                </div>

                <!--
                    IMPORTANTE (Clase 6.1 - Slide 34):
                    El campo de usuario DEBE llamarse "username"
                    y el de contraseña DEBE llamarse "password"
                    para que Spring Security los reconozca.
                    El action apunta a /processLogin (loginProcessingUrl).
                -->
                <form th:action="@{/processLogin}" method="post">

                    <div class="mb-3">
                        <label for="username" class="form-label">Correo electrónico</label>
                        <input type="email"
                               id="username"
                               name="username"
                               class="form-control"
                               placeholder="admin@cine.com"
                               required/>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="••••••••"
                               required/>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Iniciar sesión
                    </button>

                </form>

                <hr/>
                <small class="text-muted d-block text-center">
                    Admin: admin@cine.com / admin123<br/>
                    User: user@cine.com / user123
                </small>

            </div>
        </div>
    </div>

</body>
</html>
