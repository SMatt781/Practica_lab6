spring.application.name=PracticaLab6

# -------------------------------------------------------
# Base de datos
# Spring Boot lee automáticamente SPRING_DATASOURCE_URL
# como override de spring.datasource.url (para Docker -e)
# -------------------------------------------------------


spring.datasource.url=jdbc:mysql://98.91.177.233:3306/practicalab6?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# -------------------------------------------------------
# Thymeleaf
# -------------------------------------------------------
spring.thymeleaf.cache=false

# -------------------------------------------------------
# Sesión: forzar cookies (evita ;jsessionid en las URLs)
# -------------------------------------------------------
server.servlet.session.tracking-modes=cookie

# -------------------------------------------------------
# Spring Session JDBC
# Guarda las sesiones en la base de datos MySQL
# Spring crea automáticamente las tablas SPRING_SESSION
# -------------------------------------------------------
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
