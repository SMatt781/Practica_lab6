spring.application.name=PracticaLab6

# -------------------------------------------------------
# Base de datos
# Soporta variables de entorno para Docker (-e SPRING_DATASOURCE_URL=...)
# Si no se pasan variables, usa los valores locales por defecto
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/practicalab6?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# -------------------------------------------------------
# Sesión HTTP
# Forzar cookies para tracking de sesión.
# Sin esto, Tomcat añade ;jsessionid=... a los redirect:/
# y Spring lanza 404 porque no encuentra esa ruta.
# -------------------------------------------------------
server.servlet.session.tracking-modes=cookie

# Sin conversión automática camelCase -> snake_case
# Cada @Column(name="...") debe coincidir exactamente con la BD
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# -------------------------------------------------------
# Thymeleaf (caché desactivado para desarrollo)
# -------------------------------------------------------
spring.thymeleaf.cache=false
